name: Secret scan

on:
  push:
  pull_request:

jobs:
  gitleaks:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        run: |
          docker run --rm -v "$PWD:/repo" -w /repo gitleaks/gitleaks:latest \
            detect --source . --redact --no-git
